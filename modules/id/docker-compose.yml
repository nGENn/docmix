services:
  keycloak:
    container_name: id_keycloak
    restart: unless-stopped
    build:
      context: ./build
      dockerfile: Dockerfile
    image: keycloak
    labels:
      - traefik.enable=true
      - traefik.http.routers.id-normal.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.id-normal.entrypoints=websecure
      - traefik.http.routers.id-normal.tls=true
      - traefik.http.routers.id-normal.tls.certresolver=letsencrypt
      - traefik.http.services.id-normal.loadbalancer.server.port=8080
      - traefik.http.routers.id-normal-http.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.id-normal-http.entrypoints=web
      - traefik.http.routers.id-normal-http.middlewares=redirect-to-https
      - traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https
      - traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true
    environment:
      - KEYCLOAK_ADMIN=${KC_USER}
      - KEYCLOAK_ADMIN_PASSWORD=${KC_PASSWORD}
    command:
      - --proxy-headers=xforwarded
      - --hostname-strict=false
      - --hostname=${DOMAIN}
      - --db-url=jdbc:postgresql://db:5432/keycloak?ssl=allow
      - --db-username=${DB_USER}
      - --db-password=${DB_PASSWORD}
      - --http-enabled=true
      - --db=postgres
    depends_on:
      - db
    networks:
      - db
      - dmz-internal

  db:
    container_name: id_postgres
    restart: unless-stopped
    image: postgres:17
    volumes:
      - db_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    networks:
      - db

  openldap:
    image: osixia/openldap:1.5.0
    container_name: openldap
    restart: unless-stopped
    environment:
      - LDAP_ORGANISATION="nGENn Gmbh"
      - LDAP_DOMAIN=ngenn.net
      - LDAP_ADMIN_PASSWORD=fRLJXN1Vy2Ns1n
      - LDAP_TLS=false
    volumes:
      - identity_ldap_production_config:/etc/ldap/slapd.d
      - identity_ldap_production_data:/var/lib/ldap
    networks:
      - db
        # - dmz-internal


volumes:
  db_data:
  identity_ldap_production_config:
  identity_ldap_production_data:


networks:
  dmz-internal:
    external: true
  app:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.31.8.0/28

  db:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.31.8.16/28

