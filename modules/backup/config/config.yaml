location:
    source_directories:
        - /system/etc
        - /system/var
        - /system/root
        - /system/home
        - /system/store
        - /system/usr/local
    one_file_system: true
    repositories:
        - borg@backup-server:/store/backups/test
    exclude_caches: true
storage:
    compression: auto,zstd
    encryption_passcommand: "cat /store/borg/.config/borgmatic/.borg_passphrase"
    archive_name_format: '{hostname}-{now}'
    ssh_command: ssh -i /store/borg/.ssh/id_ecdsa_521_backup -p 22
    borg_keys_directory: /store/borg/.config/borg/keys
    borg_base_directory: /store/borg/.config/borg/security
retention:
    keep_daily: 7
    keep_weekly: 7
    keep_monthly: 12
    keep_yearly: 2
    prefix: '{hostname}-'
consistency:
    checks:
        - repository
        - archives
    check_last: 3
    prefix: '{hostname}-'
hooks:
    before_backup:
      - echo "`date` - Starting backup"
    after_backup:
      - echo "`date` - Finished backup"