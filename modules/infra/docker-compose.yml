services:
  netbox: &netbox
    image: docker.io/netboxcommunity/netbox:${VERSION-v4.4}
    container_name: infra_netbox
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
      - redis-cache
    env_file: ../../../docmix-config/modules/infra/netbox.env
    user: "unit:root"
    healthcheck:
      test: curl -f http://localhost:8080/login/ || exit 1
      start_period: 90s
      timeout: 3s
      interval: 15s
    networks:
      - app
      - dmz-internal
    labels:
      - traefik.enable=true
      - traefik.http.routers.infra.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.infra.entrypoints=websecure
      - traefik.http.routers.infra.tls=true
      - traefik.http.routers.infra.tls.certresolver=letsencrypt
      - traefik.http.services.infra.loadbalancer.server.port=8080
    volumes:
      - ../../../docmix-config/modules/infra/extra.py:/etc/netbox/config/extra.py:z,ro
      - netbox_media_files:/opt/netbox/netbox/media:rw
      - netbox_reports_files:/opt/netbox/netbox/reports:rw
      - netbox_scripts_files:/opt/netbox/netbox/scripts:rw
  netbox-worker:
    <<: *netbox
    container_name: infra_netbox_worker
    networks:
      - app
    depends_on:
      netbox:
        condition: service_healthy
    labels:
      - traefik.enable=false
    command:
      - /opt/netbox/venv/bin/python
      - /opt/netbox/netbox/manage.py
      - rqworker
    healthcheck:
      test: ps -aux | grep -v grep | grep -q rqworker || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
  netbox-housekeeping:
    <<: *netbox
    container_name: infra_netbox_housekeeping
    networks:
      - app
    labels:
      - traefik.enable=false
    depends_on:
      netbox:
        condition: service_healthy
    command:
      - /opt/netbox/housekeeping.sh
    healthcheck:
      test: ps -aux | grep -v grep | grep -q housekeeping || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s

  # postgres
  postgres:
    networks:
      - app
    image: docker.io/postgres:17-alpine
    container_name: infra_postgres
    restart: unless-stopped
    healthcheck:
      test: pg_isready -q -t 2 -d $$POSTGRES_DB -U $$POSTGRES_USER
      start_period: 20s
      timeout: 30s
      interval: 10s
      retries: 5
    env_file: ../../../docmix-config/modules/infra/postgres.env
    volumes:
      - netbox_postgres_data:/var/lib/postgresql/data

  # redis
  redis:
    networks:
      - app
    image: docker.io/valkey/valkey:8.0-alpine
    container_name: infra_redis
    restart: unless-stopped
    command:
      - sh
      - -c # this is to evaluate the $REDIS_PASSWORD from the env
      - valkey-server --appendonly yes --requirepass $$REDIS_PASSWORD ## $$ because of docker-compose
    healthcheck: &redis-healthcheck
      test: '[ $$(valkey-cli --pass "$${REDIS_PASSWORD}" ping) = ''PONG'' ]'
      start_period: 5s
      timeout: 3s
      interval: 1s
      retries: 5
    env_file: ../../../docmix-config/modules/infra/redis.env
    volumes:
      - netbox_redis_data:/data
  redis-cache:
    networks:
      - app
    image: docker.io/valkey/valkey:8.0-alpine
    container_name: infra_redis_cache
    restart: unless-stopped
    command:
      - sh
      - -c # this is to evaluate the $REDIS_PASSWORD from the env
      - valkey-server --requirepass $$REDIS_PASSWORD ## $$ because of docker-compose
    healthcheck: *redis-healthcheck
    env_file: ../../../docmix-config/modules/infra/redis-cache.env
    volumes:
      - netbox_redis_cache_data:/data

volumes:
  netbox_media_files:
  netbox_postgres_data:
  netbox_redis_cache_data:
  netbox_redis_data:
  netbox_reports_files:
  netbox_scripts_files:


networks:
  app:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.31.9.0/28
  dmz-internal:
    external: true
