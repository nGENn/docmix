services:
  wikijs:
    container_name: wiki_wikijs
    image: requarks/wiki:latest
    depends_on:
      - postgres
    environment:
      DB_TYPE: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASSWORD}
      DB_NAME: wiki
    restart: unless-stopped
    networks:
      - dmz-internal
      - db
      - app
    labels:
      - traefik.enable=true
      - traefik.http.routers.wiki.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.wiki.entrypoints=websecure
      - traefik.http.routers.wiki.tls.certresolver=letsencrypt
      - traefik.http.services.wiki.loadbalancer.server.port=3000

  kroki:
    container_name: wiki_kroki
    image: yuzutech/kroki
    restart: unless-stopped  
    depends_on:
      - blockdiag
      - mermaid
      - bpmn
      - excalidraw
    environment:
      - KROKI_BLOCKDIAG_HOST=blockdiag
      - KROKI_MERMAID_HOST=mermaid
      - KROKI_BPMN_HOST=bpmn
      - KROKI_EXCALIDRAW_HOST=excalidraw
    labels:
      - traefik.enable=true
      - traefik.http.routers.kroki.rule=Host(`${KROKI_DOMAIN}`)
      - traefik.http.routers.kroki.entrypoints=websecure
      - traefik.http.routers.kroki.tls.certresolver=letsencrypt
      - traefik.http.services.kroki.loadbalancer.server.port=8000
    networks:
      - app
      - dmz-internal

  blockdiag:
    container_name: wiki_blockdiag
    image: yuzutech/kroki-blockdiag
    restart: unless-stopped
    expose:
      - "8001"
    networks:
      - app

  mermaid:
    container_name: wiki_mermaid
    image: yuzutech/kroki-mermaid
    restart: unless-stopped
    expose:
      - "8002"
    networks:
      - app

  bpmn:
    container_name: wiki_bpmn
    image: yuzutech/kroki-bpmn
    restart: unless-stopped
    expose:
      - "8003"
    networks:
      - app

  excalidraw:
    container_name: wiki_excalidraw
    image: yuzutech/kroki-excalidraw
    restart: unless-stopped
    expose:
      - "8004"
    networks:
      - app

  postgres:
    container_name: wiki_postgres
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: wiki
      POSTGRES_INITDB_ARGS: --encoding=UTF-8 --lc-collate=C --lc-ctype=C
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - db

networks:
  dmz-internal:
    external: true
  db:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.31.12.16/28
  app:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.31.12.0/28

volumes:
  postgres_data:
